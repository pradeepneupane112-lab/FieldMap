<!DOCTYPE html>
<html>
<head>
  <title>CGNet Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; }
    #map { height: 100vh; width: 100vw; }
    #sidebar {
      display: none; position: absolute; top: 10px; right: 10px; width: 220px;
      background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(4px);
      padding: 10px; z-index: 1000; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.2);
      max-height: 80vh; overflow-y: auto;
    }
    .missing-item { padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.1); font-size: 12px; }
    .btn-link { 
      display: inline-block; margin-top: 4px; padding: 6px 10px; 
      background: #28a745; color: white; border: none; cursor: pointer;
      border-radius: 4px; font-size: 11px; font-weight: bold; 
    }
    .popup-btn {
      background: #28a745; color: white; border: none; padding: 6px 12px;
      border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 8px;
      width: 100%;
    }
    .nav-btn {
      background: #4285F4; color: white; border: none; padding: 6px 12px;
      border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px;
      width: 100%; text-decoration: none; display: inline-block; text-align: center;
      box-sizing: border-box; font-size: 12px;
    }
    .copied { background: #6c757d !important; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="sidebar">
    <h4 style="margin:0 0 10px 0">No Location Found</h4>
    <div id="missing-list"></div>
  </div>

  <script>
    const map = L.map('map').setView([27.7172, 85.3240], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    const URL = 'https://script.google.com/macros/s/AKfycbww_oKb4yq-eYbEbrHYGpXrfI5fWo-h0FL-pkate96BsHlS47kiei-ssNU0lhMgWiPA/exec';

    function copyLink(url, btn) {
      navigator.clipboard.writeText(url).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = "✓ Copied!";
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      }).catch(err => { alert("Failed to copy link."); });
    }

    function loadData() {
      // Added timestamp to URL to force fresh data from Google Sheets
      fetch(URL + "?v=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
          map.eachLayer(l => { if (l instanceof L.Marker) map.removeLayer(l); });
          
          const list = document.getElementById('missing-list');
          const sidebar = document.getElementById('sidebar');
          list.innerHTML = "";
          let missingCount = 0;

          data.forEach(item => {
            if (item.lat !== null && item.lng !== null && !isNaN(item.lat) && item.lat !== 0) {
              const gMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${item.lat},${item.lng}`;

              L.marker([item.lat, item.lng]).addTo(map)
                .bindPopup(`
                  <div style="text-align:center; min-width: 150px;">
                    <b style="font-size:14px">Ticket: ${item.ticket}</b><br>
                    <button onclick="copyLink('${item.ticketUrl}', this)" class="popup-btn">
                      📋 Copy Link
                    </button>
                    <a href="${gMapsUrl}" target="_blank" class="nav-btn">
                      📍 Get Directions
                    </a>
                  </div>
                `);
            } else if (item.ticket) {
              missingCount++;
              const div = document.createElement('div');
              div.className = 'missing-item';
              div.innerHTML = `
                <b>${item.ticket}</b><br>
                <button onclick="copyLink('${item.ticketUrl}', this)" class="btn-link">📋 Copy Fix Link</button>
              `;
              list.appendChild(div);
            }
          });
          sidebar.style.display = (missingCount > 0) ? "block" : "none";
        })
        .catch(err => console.error("Error loading data:", err));
    }

    loadData();
    setInterval(loadData, 60000); // Refresh data every minute
  </script>
</body>
</html>
